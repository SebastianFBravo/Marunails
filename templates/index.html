{% extends "base.html" %}
{% block title %}Inicio — MaruNails{% endblock %}
{% block content %}

<style>
.home-hero {
    text-align: center;
    padding: 40px 20px 32px;
}
.home-hero-logo {
    height: 130px;
    width: auto;
    max-width: 80%;
    mix-blend-mode: multiply;
    display: block;
    margin: 0 auto 18px;
    opacity: 0.92;
    object-fit: contain;
    object-position: center;
}
.home-hero-greeting {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--brown-mid);
    margin-bottom: 6px;
}
.home-hero-divider {
    width: 40px;
    height: 1px;
    background: var(--brown-mid);
    margin: 14px auto 28px;
    opacity: 0.35;
}

.quick-links-label {
    text-align: center;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    font-family: 'Inter', sans-serif;
}

.quick-link {
    border-top: 2px solid var(--brown-pale);
    transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
}
.quick-link:hover {
    border-top-color: var(--brown-mid);
}

@media (max-width: 600px) {
    .home-hero-logo { height: 100px; }
    .home-hero { padding: 28px 16px 20px; }
    .quick-links { grid-template-columns: 1fr !important; }
}
</style>

<div class="home-hero">
    <img src="{{ url_for('static', filename='Logotipo principal-05.PNG') }}"
         alt="MaruNails" class="home-hero-logo">
    <div class="home-hero-greeting">Bienvenida</div>
    <div class="home-hero-divider"></div>
</div>

<p class="quick-links-label">¿Qué querés hacer?</p>

<div class="quick-links" style="grid-template-columns: repeat(3, 1fr); --ql-cols: 3;">
    <a href="/corte" class="quick-link">
        <div class="quick-link-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><path d="M12 8v4l3 3"/>
            </svg>
        </div>
        <div class="quick-link-text">
            <strong>Registrar Corte</strong>
            <span>Cargar un servicio del día</span>
        </div>
    </a>
    <a href="/gasto" class="quick-link">
        <div class="quick-link-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/>
            </svg>
        </div>
        <div class="quick-link-text">
            <strong>Registrar Gasto</strong>
            <span>Cargar un gasto del negocio</span>
        </div>
    </a>
    <a href="/cashflow" class="quick-link">
        <div class="quick-link-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
        </div>
        <div class="quick-link-text">
            <strong>Cashflow</strong>
            <span>Ver ingresos, gastos y saldo</span>
        </div>
    </a>
</div>

{% endblock %}
